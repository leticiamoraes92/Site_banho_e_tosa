<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato | PetCare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container header-content">
        <h1 class="logo">🐾 PetCare</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="servicos.html">Serviços</a>
            <a href="agendamento.html" class="btn-nav">Agendar</a>
            <a href="contato.html">Contato</a>
        </nav>
    </div>
</header>

<section class="section">
    <div class="container">

        <h2 class="section-title">Entre em Contato</h2>

        <div class="cards">

            <div class="card">
                <h3>📍 Endereço</h3>
                <p>Rua dos Pets, 123</p>
                <p>Centro - Itapetininga</p>
            </div>

            <div class="card">
                <h3>📞 Telefone</h3>
                <p>(15) 99999-9999</p>
            </div>

            <div class="card">
                <h3>📧 Email</h3>
                <p>contato@petcare.com</p>
            </div>

        </div>

        <br><br>

        <h2 class="section-title">Envie uma mensagem</h2>

        <form class="form">

            <input type="text" placeholder="Seu nome" required>

            <input type="email" placeholder="Seu email" required>

            <textarea placeholder="Digite sua mensagem" rows="5"></textarea>

            <button class="btn">Enviar Mensagem</button>

        </form>

    </div>
</section>

<footer>
    <p>© 2026 PetCare - Todos os direitos reservados</p>
</footer>

<script src="script.js"></script>

</body>
</html>
